name: 刻印切り出し

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: kokuin
  cancel-in-progress: false

jobs:
  kokuin:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4

      - name: Googleに認証
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 確認用ライブラリを導入
        run: pip install google-api-python-client google-auth

      - name: 新着動画を確認
        id: check
        run: python kokuin.py check

      - name: OCRモデルのキャッシュ
        if: steps.check.outputs.found == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.EasyOCR
          key: easyocr-models-v1

      - name: OCRライブラリを導入
        if: steps.check.outputs.found == 'true'
        run: pip install opencv-python-headless easyocr

      - name: 刻印を切り出して保存
        if: steps.check.outputs.found == 'true'
        run: python kokuin.py process

      - name: 処理済みリストを保存
        if: steps.check.outputs.found == 'true'
        run: |
          git config user.name "kokuin-bot"
          git config user.email "actions@github.com"
          git add processed.json
          git commit -m "処理済みリストを更新" || echo "変更なし"
          git push || echo "push不要"
